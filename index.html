<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>調剤報酬改定2026 まとめ資料共有用</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --accent: #1a6b4a;
    --accent-light: #e6f4ee;
    --accent-mid: #2d9265;
    --text: #1e1e1e;
    --text-sub: #6b6b6b;
    --border: #e2e0da;
    --radius: 12px;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  header {
    background: var(--accent);
    color: #fff;
    padding: 2.5rem 1.5rem 2rem;
  }

  .header-inner {
    max-width: 680px;
    margin: 0 auto;
  }

  .header-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 0.5rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 0.4rem;
  }

  .header-sub {
    font-size: 13px;
    opacity: 0.75;
  }

  main {
    max-width: 680px;
    margin: 2rem auto 0;
    padding: 0 1rem;
  }

  .section-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-sub);
    letter-spacing: 0.08em;
    margin-bottom: 0.75rem;
    padding-left: 4px;
  }

  .card-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 2.5rem;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    text-decoration: none;
    color: var(--text);
    transition: box-shadow 0.18s, border-color 0.18s, transform 0.12s;
  }

  .card:hover {
    border-color: var(--accent-mid);
    box-shadow: 0 2px 12px rgba(26,107,74,0.10);
    transform: translateY(-1px);
  }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-icon svg {
    width: 20px;
    height: 20px;
    stroke: var(--accent);
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    line-height: 1.5;
  }

  .card-arrow {
    font-size: 18px;
    color: var(--text-sub);
    flex-shrink: 0;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 99px;
    padding: 2px 8px;
    margin-left: 8px;
    vertical-align: middle;
  }

  footer {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 1rem;
    font-size: 12px;
    color: var(--text-sub);
    text-align: right;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <p class="header-label">社内ポータル共有資料</p>
    <h1>調剤報酬改定2026<br>まとめ資料</h1>
    <p class="header-sub">最終更新：2026年3月</p>
  </div>
</header>

<main>
  <p class="section-title">資料一覧</p>
  <div class="card-list">

    <a class="card" href="服用薬剤調整支援料２_2026改定.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <span class="card-title">服用薬剤調整支援料２<span class="badge">2026改定</span></span>
      <span class="card-arrow">›</span>
    </a>

    <a class="card" href="服用薬剤調整支援料２_資格取得ステップ.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <span class="card-title">服用薬剤調整支援料２ 資格取得ステップ</span>
      <span class="card-arrow">›</span>
    </a>

  </div>
</main>

<footer>
  調剤報酬改定2026 社内共有用
</footer>

</body>
</html>
