    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #f2f4f8;
        --surface: #ffffff;
        --accent: #1e5fa8;
        --accent-light: #e8f0fb;
        --accent-mid: #2d7dd6;
        --text: #222222;
        --text-sub: #666666;
        --border: #d8dde8;
        --radius: 8px;
      }
      body {
        font-family: "Noto Sans JP", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 0 0 4rem;
      }
      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 1.25rem 1.5rem;
      }
      .header-inner {
        max-width: 720px;
        margin: 0 auto;
      }
      header h1 {
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
        line-height: 1.4;
      }
      main {
        max-width: 720px;
        margin: 2rem auto 0;
        padding: 0 1rem;
      }
      .section-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--accent);
        border-left: 3px solid var(--accent);
        padding-left: 10px;
        margin-bottom: 1rem;
      }
      .card-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 2rem;
      }
      .card {
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        text-decoration: none;
        color: var(--text);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .card:hover {
        border-color: var(--accent-mid);
        box-shadow: 0 2px 8px rgba(30, 95, 168, 0.1);
      }
      .card-icon {
        width: 36px;
        height: 36px;
        border-radius: 6px;
        background: var(--accent-light);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .card-icon svg {
        width: 18px;
        height: 18px;
        stroke: var(--accent);
      }
      .card-title {
        font-size: 14px;
        font-weight: 500;
        flex: 1;
        line-height: 1.5;
      }
      .card-arrow {
        font-size: 18px;
        color: var(--text-sub);
        flex-shrink: 0;
      }
    </style>
  </head>
