<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基礎的医薬品追加品目（R8.4改定）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1e5fa8;--ink:#222;--bg:#f3f4f6;--white:#fff;--box-blue:#e4f0f8;--box-gray:#f2f2f2;--border:#d1d5db;--border-dk:#9ca3af;--radius:10px;--radius-sm:6px}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.7;padding:24px 16px 60px}
.page{max-width:980px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.page-title{border-left:4px solid var(--blue);padding:6px 0 6px 16px}
.page-title h1{font-size:18px;font-weight:900}
.page-title p{font-size:12px;color:#666;margin-top:4px}
.note{background:var(--box-blue);border-radius:var(--radius-sm);padding:10px 16px;font-size:12px;color:#444}
.search-area{background:var(--white);border:.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-area label{font-weight:700;font-size:13px;white-space:nowrap}
.search-input{flex:1;min-width:180px;border:1px solid var(--border-dk);border-radius:var(--radius-sm);padding:7px 12px;font-size:14px;font-family:inherit;outline:none}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 0 2px #c7ddf4}
.search-count{font-size:12px;color:#666;white-space:nowrap}
.clear-btn{background:none;border:1px solid var(--border-dk);border-radius:var(--radius-sm);padding:6px 12px;font-size:12px;cursor:pointer;color:#555;font-family:inherit}
.clear-btn:hover{background:var(--box-gray)}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab-btn{padding:7px 16px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;border:1px solid var(--border);border-bottom:none;background:var(--box-gray);cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;color:#666}
.tab-btn.active{background:var(--white);color:var(--blue);border-color:var(--border-dk);position:relative;z-index:1}
.tab-btn .cnt{font-size:11px;font-weight:400;margin-left:3px}
.table-container{background:var(--white);border:1px solid var(--border-dk);border-radius:0 var(--radius) var(--radius) var(--radius);margin-top:-1px;overflow:hidden}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--box-gray);font-weight:900;padding:9px 12px;text-align:left;border-bottom:2px solid var(--border-dk);white-space:nowrap}
tbody td{padding:7px 12px;border-bottom:.5px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f8fafd}
.no-result{padding:32px;text-align:center;color:#888;font-size:13px}
.hidden{display:none}
mark{background:#fff3cd;border-radius:2px;padding:0}
.senpatu-col{background:#fafafa;color:#555;font-size:12px;}
.price{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.price-high{color:#c0392b;font-weight:700}
.price-low{color:#1e5fa8;font-weight:700}
.table-container{overflow-y:auto;max-height:72vh}
thead tr{position:sticky;top:0;z-index:2}
.cat-label{font-size:11px;color:#777;white-space:nowrap}
@media(max-width:640px){body{font-size:12px;padding:12px 10px 40px}.page-title h1{font-size:15px}.tab-btn{padding:6px 10px;font-size:11px}table{font-size:12px}thead th,tbody td{padding:6px 8px}}

/* ===== モバイルカード表示 ===== */
@media(max-width:640px){
  body{font-size:13px;padding:10px 8px 40px}
  .page-title h1{font-size:15px}
  .tab-btn{padding:5px 9px;font-size:11px}
  .search-area{padding:10px 12px;gap:8px}
  .search-input{font-size:13px}
  /* テーブルを非表示にしてカード表示に切り替え */
  .table-wrap table{display:none}
  .card-list{display:block!important}
}
@media(min-width:641px){
  .card-list{display:none!important}
}
.card-list{display:none}
.drug-card{background:#fff;border:1px solid #d1d5db;border-radius:8px;padding:12px 14px;margin-bottom:8px}
.drug-card-name{font-size:14px;font-weight:700;color:#1e5fa8;margin-bottom:4px;line-height:1.4}
.drug-card-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}
.badge-cat{background:#e4f0f8;color:#1e5fa8}
.badge-price-high{background:#fee2e2;color:#c0392b}
.badge-price-same{background:#f0fdf4;color:#16a34a}
.badge-price-low{background:#fafafa;color:#555}
.drug-card-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:4px;font-size:12px;color:#555}
.drug-card-row .label{color:#888;margin-right:4px}
.drug-card-price-row{display:flex;gap:16px;margin-top:6px;font-size:13px}
.drug-card-price{font-weight:700}
.drug-card-price.high{color:#c0392b}
.drug-card-price.low{color:#1e5fa8}
.drug-card-ref{font-size:11px;color:#666}
.no-card-result{padding:24px;text-align:center;color:#888;font-size:13px}
.knowledge-link-bar{text-align:center;padding:20px 16px 16px}

.price-filter-btns{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pf-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border-dk);background:var(--white);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;color:#555;transition:all .15s}
.pf-btn:hover{border-color:var(--blue);color:var(--blue)}
.pf-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
@media(max-width:640px){.pf-btn{padding:5px 10px;font-size:11px}}
</style>
</head>

  <div class="page-title">

  </div>
  <div class="card-list" id="cardList"></div>
  <div class="table-container">

    </div>
  </div>
</div>

  return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
}
function matches(r,q){if(!q)return true;const nq=norm(q);return norm(r.品名).includes(nq)||norm(r.成分).includes(nq)||norm(r.メーカー名).includes(nq)||norm(r.先発品名||'').includes(nq);}

function setPriceFilter(val){
  window._priceFilter=val;
  document.querySelectorAll('.pf-btn').forEach(b=>b.classList.toggle('active',b.dataset.val===val));
  render();
}
function render(){
  const q=curQ;
  const tbody=document.getElementById('tbody');
  const noRes=document.getElementById('noResult');
  const pf=window._priceFilter||'all';
  function priceMatch(r){
    const p=parseFloat(r.薬価),s=parseFloat(r.先発薬価);
    if(pf==='all') return true;
    if(pf==='no-ref') return !r.先発薬価||r.先発薬価==='';
    if(isNaN(p)||isNaN(s)) return false;
    if(pf==='cheaper') return p<s;
    if(pf==='same') return Math.abs(p-s)<0.01;
    if(pf==='expensive') return p>s;
    return true;
  }
  const filtered=allRows.filter(r=>(curTab==='all'||r.区分===curTab)&&matches(r,q)&&priceMatch(r));
  // カウント更新
  const allFiltered=allRows.filter(r=>matches(r,q)).length;
  document.getElementById('cnt-all').textContent='('+allFiltered+')';
  for(const cat of CATS){
    const n=allRows.filter(r=>r.区分===cat&&matches(r,q)).length;
    document.getElementById('cnt-'+cat).textContent='('+n+')';
  }
  document.getElementById('searchCount').textContent=q?filtered.length+'件':'';
  if(!filtered.length){tbody.innerHTML='';noRes.classList.remove('hidden');return;}
  noRes.classList.add('hidden');
  tbody.innerHTML=filtered.map(r=>{const p=parseFloat(r.薬価),s=parseFloat(r.先発薬価);const hi=(!isNaN(p)&&!isNaN(s)&&p>s);const lo=(!isNaN(p)&&!isNaN(s)&&p<s);return'<tr><td class="cat-label">'+esc(r.区分)+'</td><td>'+hl(r.品名,q)+'</td><td>'+hl(r.成分,q)+'</td><td style="font-size:12px">'+esc(r.規格単位)+'</td><td>'+hl(r.メーカー名,q)+'</td><td class="price'+(hi?' price-high':lo?' price-low':'')+'">'+esc(r.薬価)+'</td><td style="font-size:12px">'+esc(r.先発品名||'')+'</td><td class="price">'+esc(r.先発薬価||'')+'</td></tr>';}).join('');
  // カード表示 (モバイル用)
  const cl=document.getElementById('cardList');
  cl.innerHTML=filtered.map(r=>{
    const p=parseFloat(r.薬価),s=parseFloat(r.先発薬価);
    const hi=(!isNaN(p)&&!isNaN(s)&&p>s);
    const same=(!isNaN(p)&&!isNaN(s)&&Math.abs(p-s)<0.01);
    const priceBadge=hi?'badge-price-high':same?'badge-price-same':'badge-price-low';
    const priceLabel=hi?'先発より高':'same'===''?'':r.先発薬価?'先発と同額以下':'先発なし';
    return '<div class="drug-card">'
      +'<div class="drug-card-name">'+hl(r.品名,q)+'</div>'
      +'<div class="drug-card-badges">'
        +'<span class="badge badge-cat">'+esc(r.区分)+'</span>'
        +(r.先発薬価?'<span class="badge '+priceBadge+'">'+(hi?'基礎的＞先発':same?'基礎的＝先発':'基礎的＜先発')+'</span>':'<span class="badge badge-price-low">先発なし</span>')
      +'</div>'
      +'<div class="drug-card-row"><span><span class="label">成分</span>'+hl(r.成分,q)+'</span></div>'
      +'<div class="drug-card-row"><span><span class="label">規格</span>'+esc(r.規格単位)+'</span><span><span class="label">メーカー</span>'+hl(r.メーカー名,q)+'</span></div>'
      +'<div class="drug-card-price-row">'
        +'<span><span class="label">薬価</span><span class="drug-card-price'+(hi?' high':'')+'">'+esc(r.薬価)+'円</span></span>'
        +(r.先発品名?'<span class="drug-card-ref">先発：'+esc(r.先発品名)+' '+esc(r.先発薬価)+'円</span>':'')
      +'</div>'
      +'</div>';
  }).join('')||'<div class="no-card-result">該当する品目が見つかりませんでした。</div>';
}
function switchTab(t){
  curTab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  render();
}
function doFilter(){curQ=document.getElementById('searchBox').value;render();}
function clearSearch(){document.getElementById('searchBox').value='';setPriceFilter('all');curQ='';render();}
render();
</script>
